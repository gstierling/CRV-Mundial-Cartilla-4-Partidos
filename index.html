<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronósticos Mundial 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: white; border-radius: 20px; padding: 32px;
      max-width: 520px; width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }
    .header { text-align: center; margin-bottom: 28px; }
    .header .ball { font-size: 48px; margin-bottom: 8px; }
    .header h1 { font-size: 24px; font-weight: 800; color: #1a202c; }
    .header p { color: #718096; font-size: 14px; margin-top: 4px; }

    .field { margin-bottom: 24px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
    .field input[type="text"] {
      width: 100%; padding: 10px 14px;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 15px; outline: none;
    }
    .field input[type="text"]:focus { border-color: #3b82f6; }

    .partidos { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
    .partido {
      background: #f8fafc; border-radius: 14px; padding: 16px 20px;
    }
    .partido .emoji { font-size: 15px; font-weight: 700; color: #4a5568; text-align: center; margin-bottom: 12px; }
    .partido .scores {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .score-input { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .score-input span {
      font-size: 11px; color: #888; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .score-input input[type="number"] {
      width: 64px; height: 64px; font-size: 28px; font-weight: 700;
      text-align: center; border: 2px solid #e2e8f0; border-radius: 12px;
      outline: none; color: #1a202c; background: white;
    }
    .score-input input[type="number"]:focus { border-color: #3b82f6; }
    .vs { font-size: 22px; font-weight: 900; color: #cbd5e0; }

    button {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white; box-shadow: 0 4px 15px rgba(99,102,241,0.4);
      transition: opacity 0.2s;
    }
    button:disabled { background: #e2e8f0; color: #a0aec0; box-shadow: none; cursor: not-allowed; }

    .msg { margin-top: 16px; padding: 14px; border-radius: 10px; text-align: center; font-weight: 600; font-size: 14px; }
    .msg.success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .msg.error   { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; }

    .footer { text-align: center; font-size: 11px; color: #a0aec0; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="ball">⚽</div>
    <h1>Pronósticos</h1>
    <p>Mundial 2026 — Fase de Grupos</p>
  </div>

  <div class="field">
    <label>👤 Tu nombre</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre..." />
  </div>

  <div class="partidos">
    <div class="partido">
      <div class="emoji">🇲🇽 vs 🇿🇦</div>
      <div class="scores">
        <div class="score-input"><span>México</span><input type="number" id="mex" min="0" max="99" /></div>
        <span class="vs">–</span>
        <div class="score-input"><span>Sudáfrica</span><input type="number" id="sud" min="0" max="99" /></div>
      </div>
    </div>
    <div class="partido">
      <div class="emoji">🇰🇷 vs 🇨🇿</div>
      <div class="scores">
        <div class="score-input"><span>Corea del Sur</span><input type="number" id="cor" min="0" max="99" /></div>
        <span class="vs">–</span>
        <div class="score-input"><span>Rep. Checa</span><input type="number" id="che" min="0" max="99" /></div>
      </div>
    </div>
    <div class="partido">
      <div class="emoji">🇨🇦 vs 🇧🇦</div>
      <div class="scores">
        <div class="score-input"><span>Canadá</span><input type="number" id="can" min="0" max="99" /></div>
        <span class="vs">–</span>
        <div class="score-input"><span>Bosnia y Herz.</span><input type="number" id="bos" min="0" max="99" /></div>
      </div>
    </div>
    <div class="partido">
      <div class="emoji">🇺🇸 vs 🇵🇾</div>
      <div class="scores">
        <div class="score-input"><span>Estados Unidos</span><input type="number" id="eua" min="0" max="99" /></div>
        <span class="vs">–</span>
        <div class="score-input"><span>Paraguay</span><input type="number" id="par" min="0" max="99" /></div>
      </div>
    </div>
  </div>

  <button id="btnEnviar" onclick="enviar()">Enviar pronóstico →</button>
  <div id="mensaje"></div>
  <p class="footer">Los datos se registran en Google Sheets automáticamente</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvWlRCUDLJ-h3SaKTS1XjkPQSmafjBF0-glN503hPXf0NHcv5SCy21oyEWZg9lYmGF/exec";

  async function enviar() {
    const nombre = document.getElementById("nombre").value.trim();
    const campos = ["mex","sud","cor","che","can","bos","eua","par"];
    const valores = campos.map(id => document.getElementById(id).value);

    if (!nombre || valores.some(v => v === "")) {
      mostrarMensaje("Por favor completa todos los campos.", "error");
      return;
    }

    const btn = document.getElementById("btnEnviar");
    btn.disabled = true;
    btn.textContent = "⏳ Enviando...";

    const data = { nombre };
    campos.forEach(id => data[id] = parseInt(document.getElementById(id).value));

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      mostrarMensaje("✅ ¡Pronóstico registrado! Gracias por participar.", "success");
      document.getElementById("nombre").value = "";
      campos.forEach(id => document.getElementById(id).value = "");
    } catch (e) {
      mostrarMensaje("❌ No se pudo enviar. Intenta de nuevo.", "error");
    }

    btn.disabled = false;
    btn.textContent = "Enviar pronóstico →";
  }

  function mostrarMensaje(texto, tipo) {
    const el = document.getElementById("mensaje");
    el.className = "msg " + tipo;
    el.textContent = texto;
  }
</script>
</body>
</html>
